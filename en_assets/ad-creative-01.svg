<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#FAFAF8"/>

  <!-- Top label -->
  <text x="72" y="88" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#AAAAAA" letter-spacing="0.5">For foreign business owners in Korea</text>

  <!-- Main headline - gray sub -->
  <text x="72" y="380" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="500" fill="#888888" letter-spacing="-0.5">Korean customers</text>
  <text x="72" y="440" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="500" fill="#888888" letter-spacing="-0.5">can't find you on</text>
  <text x="72" y="500" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="500" fill="#888888" letter-spacing="-0.5">Naver or Kakao?</text>

  <!-- Bold punch line -->
  <text x="72" y="620" font-family="Inter, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#1A1A1A" letter-spacing="-2">I'll set it all up</text>
  <text x="72" y="720" font-family="Inter, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#1A1A1A" letter-spacing="-2">for you.</text>

  <!-- Bottom tagline -->
  <text x="72" y="940" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#999999">Korean marketing setup, done in one go.</text>

  <!-- Brand -->
  <text x="860" y="1040" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#BBBBBB">GrowthPilot</text>
</svg>