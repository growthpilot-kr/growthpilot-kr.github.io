<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
    </style>
    <filter id="cardShadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1080" height="1080" fill="#1A1F2E"/>

  <!-- Subtle dot pattern on dark bg -->
  <g opacity="0.06">
    <circle cx="80" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="200" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="320" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="440" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="560" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="680" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="800" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="920" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="1000" cy="80" r="2" fill="#FFFFFF"/>
    <circle cx="80" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="200" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="320" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="440" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="560" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="680" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="800" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="920" cy="200" r="2" fill="#FFFFFF"/>
    <circle cx="1000" cy="200" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Top label on dark bg -->
  <text x="540" y="68" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#6B7280" letter-spacing="1.5" text-anchor="middle">FOR FOREIGN BUSINESS OWNERS IN KOREA</text>

  <!-- White card / board -->
  <rect x="64" y="100" width="952" height="820" rx="24" fill="#FFFFFF" filter="url(#cardShadow2)"/>

  <!-- Pin/clip decoration at top of card -->
  <rect x="490" y="84" width="100" height="32" rx="6" fill="#3B82F6"/>
  <rect x="510" y="88" width="60" height="8" rx="4" fill="#60A5FA"/>

  <!-- Checklist inside the white card -->
  <g transform="translate(120, 170)">
    <!-- Check 1 -->
    <rect x="0" y="0" width="840" height="64" rx="12" fill="#F0F7FF"/>
    <circle cx="36" cy="32" r="16" fill="#3B82F6"/>
    <text x="36" y="39" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">✓</text>
    <text x="68" y="39" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#64748B">Naver Place registered</text>

    <!-- Check 2 -->
    <rect x="0" y="76" width="840" height="64" rx="12" fill="#F0F7FF"/>
    <circle cx="36" cy="108" r="16" fill="#3B82F6"/>
    <text x="36" y="115" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">✓</text>
    <text x="68" y="115" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#64748B">Kakao Channel set up</text>

    <!-- Check 3 -->
    <rect x="0" y="152" width="840" height="64" rx="12" fill="#F0F7FF"/>
    <circle cx="36" cy="184" r="16" fill="#3B82F6"/>
    <text x="36" y="191" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">✓</text>
    <text x="68" y="191" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#64748B">Instagram ads running</text>

    <!-- Check 4 -->
    <rect x="0" y="228" width="840" height="64" rx="12" fill="#F0F7FF"/>
    <circle cx="36" cy="260" r="16" fill="#3B82F6"/>
    <text x="36" y="267" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">✓</text>
    <text x="68" y="267" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#64748B">Tracking installed</text>
  </g>

  <!-- Bold punch line inside card -->
  <text x="540" y="620" font-family="Inter, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">All done.</text>
  <text x="540" y="710" font-family="Inter, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">You didn't lift a finger.</text>

  <!-- Tagline inside card -->
  <text x="540" y="800" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#9CA3AF" text-anchor="middle">One-time setup · Free consultation</text>

  <!-- Bottom bar -->
  <rect x="0" y="960" width="1080" height="120" fill="#141820"/>
  <text x="540" y="1032" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" text-anchor="middle">GrowthPilot</text>
</svg>