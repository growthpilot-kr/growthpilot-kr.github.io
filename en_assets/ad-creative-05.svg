<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
    </style>
    <filter id="cardShadow5">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1080" height="1080" fill="#1A1F2E"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#6B7280" letter-spacing="1.5" text-anchor="middle">FOR FOREIGN BUSINESS OWNERS IN KOREA</text>

  <!-- White card -->
  <rect x="64" y="100" width="952" height="820" rx="24" fill="#FFFFFF" filter="url(#cardShadow5)"/>

  <!-- Clip -->
  <rect x="490" y="84" width="100" height="32" rx="6" fill="#3B82F6"/>
  <rect x="510" y="88" width="60" height="8" rx="4" fill="#60A5FA"/>

  <!-- Empathy opening -->
  <text x="540" y="210" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#9CA3AF" text-anchor="middle">You came to Korea</text>
  <text x="540" y="260" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#9CA3AF" text-anchor="middle">to run a business.</text>

  <!-- Bold punch — the overwhelm -->
  <text x="540" y="400" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">Not to figure out</text>
  <text x="540" y="490" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">Korean marketing.</text>

  <!-- Divider -->
  <rect x="460" y="530" width="160" height="3" rx="1.5" fill="#E5E7EB"/>

  <!-- Overwhelm list — all the stuff they don't want to deal with -->
  <text x="540" y="590" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#9CA3AF" text-anchor="middle">Naver Place. Kakao Channel. Korean ads. Reviews.</text>
  <text x="540" y="635" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#3B82F6" text-anchor="middle">I'll handle all of it.</text>

  <!-- CTA button -->
  <rect x="360" y="700" width="360" height="60" rx="30" fill="#1A1F2E"/>
  <text x="540" y="739" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">Free Consultation →</text>

  <!-- Bottom tagline in card -->
  <text x="540" y="840" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#C4C4C4" text-anchor="middle">One-time setup · No monthly contract required</text>

  <!-- Bottom bar -->
  <rect x="0" y="960" width="1080" height="120" fill="#141820"/>
  <text x="540" y="1032" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" text-anchor="middle">GrowthPilot</text>
</svg>