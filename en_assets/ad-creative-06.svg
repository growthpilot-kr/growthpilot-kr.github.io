<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
    </style>
    <filter id="cardShadow6">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1080" height="1080" fill="#1A1F2E"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#6B7280" letter-spacing="1.5" text-anchor="middle">FOR FOREIGN BUSINESS OWNERS IN KOREA</text>

  <!-- White card -->
  <rect x="64" y="100" width="952" height="820" rx="24" fill="#FFFFFF" filter="url(#cardShadow6)"/>

  <!-- Clip -->
  <rect x="490" y="84" width="100" height="32" rx="6" fill="#3B82F6"/>
  <rect x="510" y="88" width="60" height="8" rx="4" fill="#60A5FA"/>

  <!-- Empathy — the reality -->
  <text x="540" y="210" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="400" fill="#9CA3AF" text-anchor="middle">Opened a business in Korea?</text>

  <!-- Bold punch — the overwhelm list -->
  <text x="540" y="360" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">Korean platforms.</text>
  <text x="540" y="445" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">Korean keywords.</text>
  <text x="540" y="530" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#1A1A1A" letter-spacing="-2" text-anchor="middle">Korean customers.</text>

  <!-- Divider -->
  <rect x="460" y="570" width="160" height="3" rx="1.5" fill="#E5E7EB"/>

  <!-- Resolution — the relief -->
  <text x="540" y="640" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="400" fill="#9CA3AF" text-anchor="middle">Overwhelming, right?</text>
  <text x="540" y="690" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#3B82F6" text-anchor="middle">I'll take care of everything.</text>

  <!-- CTA button -->
  <rect x="360" y="740" width="360" height="60" rx="30" fill="#1A1F2E"/>
  <text x="540" y="779" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">Free Consultation →</text>

  <!-- Bottom tagline -->
  <text x="540" y="860" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#C4C4C4" text-anchor="middle">One-time setup by a bilingual Korean marketer</text>

  <!-- Bottom bar -->
  <rect x="0" y="960" width="1080" height="120" fill="#141820"/>
  <text x="540" y="1032" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" text-anchor="middle">GrowthPilot</text>
</svg>