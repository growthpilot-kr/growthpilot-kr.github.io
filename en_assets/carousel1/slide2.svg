<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap');</style></defs>
  <rect width="1080" height="1080" fill="#1A1F2E"/>
  <text x="60" y="70" font-family="Inter,sans-serif" font-size="24" font-weight="500" fill="#555">2/7</text>
  <text x="90" y="180" font-family="Inter,sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">Why Korean customers</text>
  <text x="90" y="250" font-family="Inter,sans-serif" font-size="52" font-weight="900" fill="#3B82F6">can't find you</text>
  <rect x="90" y="290" width="120" height="4" rx="2" fill="#3B82F6" opacity="0.4"/>
  <text x="90" y="400" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#3B82F6">01</text>
  <text x="160" y="400" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Wrong platforms</text>
  <text x="160" y="450" font-family="Inter,sans-serif" font-size="26" font-weight="400" fill="#94A3B8">Koreans use Naver, not Google.</text>
  <text x="90" y="570" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#3B82F6">02</text>
  <text x="160" y="570" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Not set up for discovery</text>
  <text x="160" y="620" font-family="Inter,sans-serif" font-size="26" font-weight="400" fill="#94A3B8">No Naver Place, no Kakao Channel.</text>
  <text x="90" y="740" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#3B82F6">03</text>
  <text x="160" y="740" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Ads miss the target</text>
  <text x="160" y="790" font-family="Inter,sans-serif" font-size="26" font-weight="400" fill="#94A3B8">Boosting posts ≠ getting customers.</text>
  <text x="540" y="1040" font-family="Inter,sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">GrowthPilot</text>
</svg>
