  <!-- Checklist style -->
  <text x="72" y="300" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="400" fill="#666666">✓  Naver Place registered</text>
  <text x="72" y="370" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="400" fill="#666666">✓  Kakao Channel set up</text>
  <text x="72" y="440" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="400" fill="#666666">✓  Instagram ads running</text>
  <text x="72" y="510" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="400" fill="#666666">✓  Tracking installed</text>

