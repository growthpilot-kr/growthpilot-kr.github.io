    body {

      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .thank-you .back-link {
      display: inline-block;
      margin-top: 32px;

      font-weight: 600;
      color: var(--white);
      background: var(--text-primary);
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .thank-you .back-link:hover {
      background: #333;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
